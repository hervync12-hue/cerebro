<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Brain Anatomy Puzzle</title>
</head>
<body>
    <h1>Brain Anatomy Puzzle</h1>
    <div id="brain-area">
        <svg id="brain-svg" viewBox="0 0 1000 400">
            <path d="..." fill="#cccccc" stroke="#666666" />
            <!-- SVG brain outline here -->
        </svg>
        <div id="target-zones">
            <!-- Target zones for puzzle pieces -->
        </div>
    </div>
    <div id="pieces-container">
        <!-- Draggable brain pieces will be here -->
    </div>
    <div id="progress-tracker">
        <p>Progress: <span id="progress">0</span>/13</p>
    </div>
    <div id="celebration-screen" style="display:none;">
        <h2>Congratulations!</h2>
        <p>You completed the puzzle!</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
